<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC GAMER BUENOS AIRES | High Performance</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-red: #ff0055;
            --bg-dark: #020205;
        }

        * { cursor: none !important; }
        body { background-color: var(--bg-dark); color: #ffffff; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        h1, h2, h3 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; }

        /* --- FRACTURE LOADER --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            perspective: 1000px;
        }

        .video-wrapper {
            position: relative; width: 450px; max-width: 90vw;
            border: 1px solid var(--neon-blue);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        #loader-video { width: 100%; display: block; filter: contrast(1.2); }

        /* Animación de Glitch Rompiéndose */
        .fracture-anim { animation: break-glitch 0.15s infinite; }
        @keyframes break-glitch {
            0% { transform: translate(0) skew(0deg); filter: hue-rotate(0deg); }
            25% { transform: translate(-5px, 5px) skew(5deg); filter: invert(1); }
            50% { transform: translate(5px, -5px) skew(-10deg); }
            75% { transform: translate(-2px, -2px) skew(2deg); filter: sepia(1) saturate(5); }
            100% { transform: translate(0) skew(0deg); }
        }

        /* --- UI ELEMENTS --- */
        .glitch-hover:hover {
            animation: text-glitch 0.2s infinite;
            text-shadow: 2px 0 red, -2px 0 blue;
        }
        @keyframes text-glitch {
            0% { transform: translate(0); }
            50% { transform: translate(-2px, 1px); }
            100% { transform: translate(2px, -1px); }
        }

        .cyber-card {
            background: rgba(10, 10, 15, 0.9); border: 1px solid rgba(0, 242, 255, 0.1);
            clip-path: polygon(0 0, 95% 0, 100% 5%, 100% 100%, 5% 100%, 0 95%);
            transition: 0.3s;
        }
        .cyber-card:hover { border-color: var(--neon-blue); transform: translateY(-5px); }

        #cursor { width: 20px; height: 20px; border: 2px solid var(--neon-blue); position: fixed; pointer-events: none; z-index: 10000; transform: rotate(45deg); mix-blend-mode: difference; }

        .btn-gamer {
            border: 1px solid #bc13fe; padding: 12px 30px; color: white;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s;
            font-family: 'Orbitron'; font-size: 11px;
        }
        .btn-gamer:hover { background: #bc13fe; box-shadow: 0 0 20px #bc13fe; color: black; }
    </style>
</head>
<body>

    <iframe width="0" height="0" src="https://www.youtube.com/embed/CdaWP8_RTA4?autoplay=1&loop=1&playlist=CdaWP8_RTA4" frameborder="0" allow="autoplay"></iframe>

    <div id="loader">
        <div class="video-wrapper" id="v-wrap">
            <video id="loader-video" autoplay loop muted playsinline>
                <source src="dog_glitch.mp4" type="video/mp4">
            </video>
        </div>
        <div class="mt-8 w-64">
            <div id="log-container" class="font-mono text-[10px] text-cyan-400 mb-2 h-10 overflow-hidden"></div>
            <div class="h-1 bg-white/5 w-full"><div id="boot-progress" class="h-full bg-cyan-500 w-0"></div></div>
        </div>
    </div>

    <div id="cursor"></div>
    <canvas id="bg-canvas" class="fixed inset-0 -z-10 opacity-20"></canvas>

    <nav class="fixed w-full z-[500] py-4 px-10 border-b border-white/5 bg-black/90 backdrop-blur-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="text-xl font-black font-gamer tracking-tighter uppercase">PC GAMER <span class="text-cyan-400">BUENOS AIRES</span></div>
            <div class="hidden lg:flex space-x-8 items-center text-[9px] font-bold uppercase tracking-[3px]">
                <a href="#builds" class="hover:text-cyan-400 transition">PC_Ready</a>
                <a href="#hardware" class="hover:text-cyan-400 transition">Partes_Venta</a>
                <a href="#reviews" class="hover:text-cyan-400 transition">Reseñas</a>
                <a href="https://wa.me/573122547162" class="btn-gamer">WhatsApp Direct</a>
            </div>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center text-center px-6 pt-24">
        <h2 class="text-cyan-400 font-gamer text-[10px] mb-6 tracking-[10px]">SUPREMACÍA EN HARDWARE</h2>
        <h1 class="text-5xl md:text-[7vw] font-black leading-none mb-8 font-gamer">
            MÁXIMO <br> <span class="glitch-hover text-white cursor-pointer">RENDIMIENTO.</span>
        </h1>
        <p class="text-gray-500 text-xs md:text-sm max-w-xl mx-auto mb-12 tracking-[4px] uppercase">
            Sin punto físico // Envíos a toda Colombia
        </p>
        
        <div class="w-full max-w-4xl aspect-video cyber-card overflow-hidden mb-20 shadow-2xl">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/1VX4k0ihU8M?start=18&autoplay=1&mute=1&loop=1&playlist=1VX4k0ihU8M" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </section>

    <section id="builds" class="py-20 container mx-auto px-6">
        <h2 class="text-center font-gamer text-2xl mb-16">PCs Disponibles</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="cyber-card p-6">
                <div class="h-40 bg-cyan-500/5 mb-4 flex items-center justify-center"><i class="fa-solid fa-microchip text-4xl text-cyan-500"></i></div>
                <h3 class="text-lg font-gamer mb-2">Pro Gamer v1</h3>
                <p class="text-[10px] text-gray-500 mb-6">RTX 4060 Ti + Ryzen 5 7600</p>
                <div class="flex justify-between items-center border-t border-white/5 pt-4">
                    <span class="text-cyan-400 font-bold">$4.850.000</span>
                    <a href="https://wa.me/573122547162?text=Hola!%20Me%20interesa%20la%20Pro%20Gamer%20v1" class="text-[9px] uppercase border border-cyan-400/30 px-3 py-1">Info</a>
                </div>
            </div>
            </div>
    </section>

    <section class="py-24 container mx-auto px-6 max-w-xl">
        <div class="cyber-card p-10 bg-black">
            <h2 class="font-gamer text-xl mb-8 text-center text-cyan-400">Cotización Táctica</h2>
            <form id="wa-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="name" placeholder="NOMBRE" class="bg-white/5 border border-white/10 p-3 text-[10px] focus:border-cyan-400 outline-none" required>
                    <input type="text" id="lastname" placeholder="APELLIDO" class="bg-white/5 border border-white/10 p-3 text-[10px] focus:border-cyan-400 outline-none" required>
                </div>
                <input type="tel" id="phone" placeholder="WHATSAPP" class="w-full bg-white/5 border border-white/10 p-3 text-[10px] focus:border-cyan-400 outline-none" required>
                <textarea id="msg" placeholder="DETALLES DE TU COMPRA..." class="w-full bg-white/5 border border-white/10 p-3 text-[10px] h-24 focus:border-cyan-400 outline-none" required></textarea>
                <button type="submit" class="w-full btn-gamer">ENVIAR PEDIDO</button>
            </form>
        </div>
    </section>

    <a href="https://wa.me/573122547162?text=Hola!%20Necesito%20asesoría%20para%20mi%20nueva%20PC" class="fixed bottom-8 right-8 z-[1000] w-14 h-14 bg-[#25D366] rounded-full flex items-center justify-center text-2xl shadow-xl hover:scale-110 transition">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        // --- LOADER LOGIC CON RUPTURA ---
        const logs = ["INITIALIZING KERNEL...", "BYPASSING LATENCY...", "OPTIMIZING GPU...", "AUTHENTICATING SYSTEM_ADMIN...", "ACCESS GRANTED."];
        let logIdx = 0;
        const logC = document.getElementById('log-container');
        const pBar = document.getElementById('boot-progress');
        const vWrap = document.getElementById('v-wrap');

        function runLoader() {
            if(logIdx < logs.length) {
                const p = document.createElement('p');
                p.textContent = "> " + logs[logIdx];
                logC.appendChild(p);
                logIdx++;
                pBar.style.width = (logIdx / logs.length * 100) + '%';
                setTimeout(runLoader, 350);
            } else {
                // Inicia efecto de "romperse"
                vWrap.classList.add('fracture-anim');
                setTimeout(() => {
                    gsap.to('#loader', {
                        scale: 2,
                        opacity: 0,
                        duration: 0.5,
                        ease: "power2.in",
                        onComplete: () => {
                            document.getElementById('loader').remove();
                            document.body.style.overflow = 'auto';
                        }
                    });
                }, 800);
            }
        }
        runLoader();

        // --- FORM A WHATSAPP ---
        document.getElementById('wa-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const n = document.getElementById('name').value;
            const l = document.getElementById('lastname').value;
            const p = document.getElementById('phone').value;
            const m = document.getElementById('msg').value;
            const text = `Hola PC GAMER BUENOS AIRES, soy ${n} ${l} (${p}). Quisiera cotizar lo siguiente: ${m}`;
            window.open(`https://wa.me/573122547162?text=${encodeURIComponent(text)}`);
        });

        // --- CURSOR & THREE JS ---
        document.addEventListener('mousemove', (e) => {
            gsap.to('#cursor', { x: e.clientX - 10, y: e.clientY - 10, duration: 0.1 });
        });

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const mesh = new THREE.Mesh(new THREE.TorusKnotGeometry(10, 3, 100, 16), new THREE.MeshBasicMaterial({ color: 0x00f2ff, wireframe: true, transparent: true, opacity: 0.1 }));
        scene.add(mesh); camera.position.z = 40;
        function anim() { requestAnimationFrame(anim); mesh.rotation.y += 0.01; renderer.render(scene, camera); }
        anim();
    </script>
</body>
</html>
